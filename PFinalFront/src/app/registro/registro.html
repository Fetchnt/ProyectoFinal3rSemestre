<div class="login-container">

  <div class="side-brand">
    <div class="brand-wrapper">
      <i class="bi bi-terminal-fill display-1"></i>
      <h1 class="mt-4">CODE TRANSLATE</h1>
      <p class="lead">Crea tu cuenta y empieza a traducir.</p>
      <div class="features mt-5">
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-lightning-charge me-3"></i>
          <span>Traducción instantánea</span>
        </div>
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-cpu me-3"></i>
          <span>Múltiples modelos de IA</span>
        </div>
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-clock-history me-3"></i>
          <span>Historial de traducciones</span>
        </div>
      </div>
    </div>
  </div>

  <div class="side-form">
    <div class="form-wrapper">
      <h2 class="mb-1 fw-bold">Crear cuenta</h2>
      <p class="text-muted small mb-4">Regístrate para guardar tu historial</p>

      <div class="mb-3">
        <label class="form-label text-uppercase small fw-bold">Username</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" placeholder="usuario123">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label text-uppercase small fw-bold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-uppercase small fw-bold">Confirmar contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <button class="btn-create">
        CREAR CUENTA <i class="bi bi-arrow-right ms-2"></i>
      </button>

      <p class="text-center mt-3 small">
        ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
