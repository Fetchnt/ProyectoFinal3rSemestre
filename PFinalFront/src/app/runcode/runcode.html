<div class="wrap container-fluid py-4 h-100 bg-white">

  <div class="mb-3">
    <a routerLink="/login" class="btn btn-outline-dark rounded-0 btn-sm d-inline-flex align-items-center gap-2">
      <i class="bi bi-arrow-left"></i> Volver al login
    </a>
  </div>

  <div class="box row g-0 border border-dark border-2 shadow-lg">

    <div class="editor col-lg-7 p-4 border-end border-dark">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0"><i class="bi bi-braces me-2"></i>EDITOR</h4>
        <select class="sel form-select w-auto fw-bold">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="java">Java</option>
          <option value="csharp">C#</option>
          <option value="cpp">C++</option>
          <option value="typescript">TypeScript</option>
          <option value="go">Go</option>
          <option value="rust">Rust</option>
          <option value="php">PHP</option>
          <option value="swift">Swift</option>
        </select>
      </div>
      <textarea class="code form-control font-code bg-light" rows="15" placeholder="Escribe tu código aquí."></textarea>
      <div class="mt-4">
        <button class="run-btn">
          <i class="bi bi-play-circle-fill me-2"></i>RUN CODE
        </button>
      </div>
    </div>

    <div class="console col-lg-5 p-4 bg-dark text-white">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 text-uppercase"><i class="bi bi-terminal me-2"></i>CONSOLA</h4>
        <span class="badge border border-light text-light">Status: Ready</span>
      </div>
    </div>

  </div>
</div>
