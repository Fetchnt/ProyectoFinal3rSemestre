  <div class="row g-4">

    <div class="col-md-7 animate__animated animate__fadeInLeft delay-2">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-uppercase m-0">
          <i class="bi bi-people me-2"></i>Usuarios
        </h5>
        <div class="dropdown">
          <button class="btn btn-dark rounded-0 btn-sm text-uppercase fw-bold px-3 dropdown-toggle no-caret"
                  type="button"
                  id="createAdminDropdown"
                  data-bs-toggle="dropdown"
                  data-bs-auto-close="outside"
                  aria-expanded="false">
            <i class="bi bi-person-plus-fill me-2"></i>Crear Administrador
          </button>
          <div class="dropdown-menu dropdown-menu-end p-4 border border-dark border-2 rounded-0 shadow m-0 panel-crear-admin"
               aria-labelledby="createAdminDropdown">
            <h6 class="fw-bold text-uppercase mb-3 small">
              <i class="bi bi-shield-plus me-1 text-danger"></i>Nuevo Administrador
            </h6>
            <form>
              <div class="mb-2">
                <label class="form-label label-xs text-uppercase fw-bold text-muted mb-1">Usuario</label>
                <input type="text" class="form-control form-control-sm border-dark rounded-0" placeholder="Ej: admin_juan">
              </div>
              <div class="mb-3">
                <label class="form-label label-xs text-uppercase fw-bold text-muted mb-1">Contraseña</label>
                <input type="password" class="form-control form-control-sm border-dark rounded-0" placeholder="••••••••">
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-dark btn-sm rounded-0 w-100 text-uppercase small fw-bold">Guardar</button>
              </div>
            </form>
          </div>
        </div>
      </div>
