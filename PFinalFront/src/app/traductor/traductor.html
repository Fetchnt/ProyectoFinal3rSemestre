<div class="wrap">
  <div class="box row g-0">

    <div class="src col-md-5 p-4">
      <div class="mb-4">
        <label class="lbl fw-bold small d-block mb-2 text-muted">LENGUAJE ORIGEN</label>
        <select class="sel form-select border-0 border-bottom border-dark rounded-0 px-0 fw-bold">
          <option selected disabled>Elegir lenguaje...</option>
          <option>Python</option><option>JavaScript</option><option>Java</option>
          <option>C#</option><option>C++</option><option>TypeScript</option>
          <option>Go</option><option>Rust</option><option>PHP</option><option>Swift</option>
        </select>
      </div>
      <textarea class="code form-control font-code border-0 bg-light" rows="12" placeholder="Pega el código que quieres traducir aqui."></textarea>
    </div>

    <div class="mid col-md-2 bg-dark d-flex flex-column align-items-center justify-content-center p-3">
      <button class="glow-btn w-100 mb-2"> TRADUCIR</button>
      <button class="swap-btn btn btn-outline-light rounded-0 w-100 small py-1">
        <i class="bi bi-arrow-left-right"></i>
      </button>
    </div>

    <div class="tgt col-md-5 p-4 border-start border-dark">
      <div class="mb-4">
        <label class="lbl fw-bold small d-block mb-2 text-muted">LENGUAJE DESTINO</label>
        <select class="sel form-select border-0 border-bottom border-dark rounded-0 px-0 fw-bold">
          <option selected disabled>Elegir lenguaje...</option>
          <option>Python</option><option>JavaScript</option><option>Java</option>
          <option>C#</option><option>C++</option><option>TypeScript</option>
          <option>Go</option><option>Rust</option><option>PHP</option><option>Swift</option>
        </select>
      </div>
      <textarea class="code form-control font-code border-0 bg-light" rows="12" placeholder="Tu codigo traducido se mostrara aqui." readonly></textarea>
      <div class="text-end mt-3">
        <button class="copy-btn btn btn-outline-dark btn-sm rounded-0"><i class="bi bi-copy"></i> COPIAR</button>
      </div>
    </div>

  </div>
</div>
