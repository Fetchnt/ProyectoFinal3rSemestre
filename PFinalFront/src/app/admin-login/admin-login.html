<div class="login-container">
  <div class="side-brand">
    <div class="brand-wrapper text-center">
      <i class="bi bi-shield-lock-fill" style="font-size: 4rem; color: #ff4444;"></i>
      <h1 class="mt-4 fw-bold" style="letter-spacing: 2px;">ADMIN</h1>
      <p style="color: #aaa;">Acceso restringido al panel de administración.</p>
      <div class="mt-5" style="color: #555; font-size: 0.85rem;">
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-eye-slash me-3" style="color:#888;"></i>
          <span>Solo personal autorizado</span>
        </div>
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-person-check me-3" style="color:#888;"></i>
          <span>Gestión de usuarios</span>
        </div>
        <div class="d-flex align-items-center">
          <i class="bi bi-bar-chart me-3" style="color:#888;"></i>
          <span>Estadísticas del sistema</span>
        </div>
      </div>
    </div>
  </div>

  <div class="side-form">
    <div class="form-wrapper">
      <div class="text-center mb-4">
        <span class="badge bg-danger px-3 py-2 mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">ACCESO ADMINISTRADOR</span>
        <h2 class="fw-bold">Panel de Control</h2>
        <p class="text-muted small">Ingresa tus credenciales de administrador</p>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label text-uppercase small fw-bold">Usuario Admin</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-shield-lock"></i></span>
            <input type="text" class="form-control" placeholder="admin">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label text-uppercase small fw-bold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" placeholder="••••••••">
          </div>
        </div>

        <a routerLink="/admin" class="btn btn-danger w-100 py-3 fw-bold rounded-0 text-decoration-none text-center d-block">
          INGRESAR AL PANEL <i class="bi bi-arrow-right ms-2"></i>
        </a>

        <p class="text-center mt-4 small">
          <a routerLink="/login" style="color:#000; text-decoration: underline;">
            <i class="bi bi-arrow-left me-1"></i>Volver al login de usuarios
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
