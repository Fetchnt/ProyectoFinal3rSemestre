<div class="login-container">
  <div class="side-brand">
    <div class="brand-wrapper text-center">
      <i class="bi bi-shield-lock-fill brand-icon"></i>
      <h1 class="mt-4 fw-bold brand-title">ADMIN</h1>
      <p class="brand-subtitle">Acceso restringido al panel de administración.</p>
      <div class="mt-5 feature-list">
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-eye-slash me-3 list-icon"></i>
          <span>Solo personal autorizado</span>
        </div>
        <div class="d-flex align-items-center mb-3">
          <i class="bi bi-person-check me-3 list-icon"></i>
          <span>Gestión de usuarios</span>
        </div>
        <div class="d-flex align-items-center">
          <i class="bi bi-bar-chart me-3 list-icon"></i>
          <span>Estadísticas del sistema</span>
        </div>
      </div>
    </div>
  </div>

  <div class="side-form">
    <div class="form-wrapper">
      <div class="text-center mb-4">
        <span class="badge bg-danger px-3 py-2 mb-3 admin-badge">ACCESO DE ADMINISTRADORES</span>
        <h2 class="fw-bold">Panel de Control</h2>
        <p class="text-muted small">Ingresa tus credenciales de administrador</p>
      </div>

      <form #adminForm="ngForm" (ngSubmit)="enviarFormulario(adminForm)">
        <div class="mb-3">
          <label class="form-label text-uppercase small fw-bold">Usuario Admin</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-shield-lock"></i></span>
            <input type="text" class="form-control" placeholder="admin"
                   name="usuario" [(ngModel)]="formulario.usuario" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label text-uppercase small fw-bold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" placeholder="••••••••"
                   name="contrasenia" [(ngModel)]="formulario.contrasenia" required>
          </div>
        </div>
        <div *ngIf="mensajeError" class="alert alert-danger py-2 small">{{ mensajeError }}</div>
        <button type="submit" class="btn-ingad" [disabled]="cargando">
          {{ cargando ? 'Ingresando...' : 'INGRESAR AL PANEL' }} <i class="bi bi-arrow-right ms-2"></i>
        </button>
        <p class="text-center mt-4 small">
          <a routerLink="/login" class="back-link">
            <i class="bi bi-arrow-left me-1"></i>Volver al login de usuarios
          </a>
        </p>
      </form>
    </div>
  </div>
</div>
