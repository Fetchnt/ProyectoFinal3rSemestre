<div class="container-fluid py-4 px-4">
<div class=head>
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-dark border-2 animate__animated animate__fadeInDown">
    <div>
      <h3 class="fw-bold m-0 text-uppercase">
        <i class="bi bi-journal-text me-2 text-danger"></i>Registro de Auditorías
      </h3>
    </div>
    <a routerLink="/admin" class="btn btn-dark rounded-0 btn-sm text-uppercase fw-bold px-3">
      <i class="bi bi-arrow-left me-2"></i>Volver al Panel
    </a>
  </div>

  <div class="animate__animated animate__fadeInUp delay-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h5 class="fw-bold text-uppercase m-0">
        <i class="bi bi-table me-2"></i>Eventos del sistema
      </h5>
    </div>
  </div>

    <div class="table-responsive border border-dark border-2 shadow-sm">
      <table class="table table-hover mb-0 audit-table">
        <thead class="bg-dark text-white">
        <tr>
          <th class="py-3 px-3">ID</th>
          <th class="py-3">Usuario</th>
          <th class="py-3">Acción</th>
        </tr>
        </thead>
        <tbody>
        <tr *ngFor="let r of registrosFiltrados" class="audit-row">
          <td class="py-3 px-3 text-muted small">{{ r.id }}</td>
          <td class="py-3">
            <div class="d-flex align-items-center gap-2">
              <span class="small fw-semibold">{{ r.usuario }}</span>
            </div>
          </td>
          <td class="py-3">
            <div class="d-flex align-items-center gap-2">
              <span class="small">{{ r.accion }}</span>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
