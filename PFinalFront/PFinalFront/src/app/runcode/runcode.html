<div class="wrap container-fluid py-4 h-100 bg-white">

  <div class="mb-3">
    <a routerLink="/login" class="btn btn-outline-dark rounded-0 btn-sm d-inline-flex align-items-center gap-2">
      <i class="bi bi-arrow-left"></i> Volver al login
    </a>
  </div>

  <div class="box row g-0 border border-dark border-2 shadow-lg">

    <div class="editor col-lg-7 p-4 border-end border-dark">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0"><i class="bi bi-braces me-2"></i>EDITOR</h4>
        <select class="sel form-select w-auto fw-bold" [(ngModel)]="lenguajeSeleccionado">
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="c++">C++</option>
          <option value="kotlin">Kotlin</option>
          <option value="lua">Lua</option>
          <option value="perl">Perl</option>
          <option value="haskell">Haskell</option>
          <option value="lisp">Lisp</option>
          <option value="ruby">Ruby</option>
          <option value="brainfuck">Brainfuck</option>
          <option value="clojure">Clojure</option>
          <option value="julia">Julia</option>
          <option value="assembly">Assembly</option>
        </select>
      </div>
      <textarea class="code form-control font-code bg-light" rows="15"
                placeholder="Escribe tu código aquí."
                [(ngModel)]="codigoEntrada"></textarea>
      <div class="mt-4">
        <button class="run-btn" (click)="ejecutarCodigo()" [disabled]="ejecutando">
          <i class="bi bi-play-circle-fill me-2"></i>{{ ejecutando ? 'EJECUTANDO...' : 'RUN CODE' }}
        </button>
      </div>
    </div>

    <div class="console col-lg-5 p-4 bg-dark text-white">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold m-0 text-uppercase"><i class="bi bi-terminal me-2"></i>CONSOLA</h4>
        <div class="d-flex gap-2 align-items-center">
          <span class="badge border border-light text-light">
            {{ ejecutando ? 'Running...' : 'Ready' }}
          </span>
          <button class="btn btn-sm btn-outline-light rounded-0" (click)="limpiarConsola()">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
      <div class="terminal-output" style="height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.85rem;">
        <div *ngFor="let linea of lineasConsola" [class]="obtenerClaseLinea(linea.tipo)"
             style="margin-bottom: 4px; white-space: pre-wrap;">
          {{ linea.texto }}
        </div>
        <div *ngIf="lineasConsola.length === 0" class="text-secondary small">
          Esperando ejecución...
        </div>
      </div>
    </div>

  </div>
</div>
